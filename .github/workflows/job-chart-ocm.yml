name: Chart OCM Component
on:
  workflow_call:
    inputs:
      chartPath:
        description: "Path to the chart directory"
        required: true
        type: string
      chartName:
        description: "Name of the chart"
        required: true
        type: string
      chartRepository:
        description: "Chart repository URL (defaults to platform-mesh/helm-charts)"
        type: string
        default: https://github.com/platform-mesh/helm-charts
      componentConstructorFile:
        description: "Path to component constructor file"
        type: string
        default: .ocm/component-constructor-chart-only.yaml
      componentName:
        description: "Component name (e.g., github.com/platform-mesh/helm-charts/security-operator)"
        required: true
        type: string
      ocmRegistryUrl:
        description: "OCM registry URL"
        type: string
        default: ghcr.io/platform-mesh

jobs:
  chart-ocm:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Create Github App Token
        uses: actions/create-github-app-token@f8d387b68d61c58ab83c6c016672934102569859 # v3
        id: app-token
        with:
          app-id: "1415820"
          private-key: ${{ secrets.PM_PUBLISHER_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}

      - name: Setup yq@latest
        run: |
          if ! command -v yq &>/dev/null
          then
            mkdir -p /home/runner/.local/bin
            wget https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64 -O /home/runner/.local/bin/yq &&\
              chmod +x /home/runner/.local/bin/yq
          fi

      - name: Check out the repo
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup OCM CLI
        run: |
          REPO=${repo:=open-component-model/ocm}
          if [ -z "$version" -o "$version" == latest ]; then
            version="$(basename "$(curl -Ls -o /dev/null -w %{url_effective} https://github.com/$REPO/releases/latest)")"
            echo "Selecting latest version: $version"
          fi
          VERSION=${version#v}
          ARCHIVE_FILE="ocm-${VERSION}-linux-amd64.tar.gz"
          URL="https://github.com/$REPO/releases/download/v${VERSION}/$ARCHIVE_FILE"
          echo "Installing ocm-cli version $version from $REPO"
          curl -LsS -o ocm-cli.tgz "$URL"
          tar --overwrite -xvzf ocm-cli.tgz >/dev/null
          chmod a+x ocm

      - name: Prepare template variables
        run: |
          VERSION=$(yq '.version' ${{ inputs.chartPath }}/Chart.yaml)
          CHART_OCI_PATH=ghcr.io/platform-mesh/helm-charts/${{ inputs.chartName }}
          CHART_REPO=${{ inputs.chartRepository }}

          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "CHART_OCI_PATH=$CHART_OCI_PATH" >> $GITHUB_ENV
          echo "CHART_REPO=$CHART_REPO" >> $GITHUB_ENV

      - name: Write OCM credentials file
        run: |
          OCM_REGISTRY_URL="${{ inputs.ocmRegistryUrl }}"
          OCM_HOSTNAME="${OCM_REGISTRY_URL%%/*}"
          OCM_PATHPREFIX="${OCM_REGISTRY_URL#*/}"
          cat <<EOF > $HOME/.ocmconfig
          type: generic.config.ocm.software/v1
          configurations:
            - type: credentials.config.ocm.software
              consumers:
                - identity:
                    type: OCIRegistry
                    scheme: https
                    hostname: ${OCM_HOSTNAME}
                    pathprefix: ${OCM_PATHPREFIX}
                  credentials:
                    - type: Credentials
                      properties:
                        username: github
                        password: ${{ secrets.GITHUB_TOKEN }}
          EOF

      - name: Create OCM ComponentArchive
        run: |
          ocm_ctf=transport.ctf
          ./ocm add components -c --templater=go --file "$ocm_ctf" ${{ inputs.componentConstructorFile }} -- \
            VERSION=${{ env.VERSION }} \
            COMPONENT_NAME=${{ inputs.componentName }} \
            CHART_OCI_PATH=${{ env.CHART_OCI_PATH }} \
            CHART_REPO=${{ env.CHART_REPO }} \
            COMMIT=${{ github.sha }}

      - name: Sign OCM component
        run: |
          printf '%s' "$OCM_SIGNING_PRIVATE_KEY" > /tmp/ocm-signing.priv
          ./ocm sign componentversion \
            --signature platform-mesh \
            --private-key /tmp/ocm-signing.priv \
            transport.ctf
          rm -f /tmp/ocm-signing.priv
        env:
          OCM_SIGNING_PRIVATE_KEY: ${{ secrets.OCM_SIGNING_PRIVATE_KEY }}

      - name: Transfer to OCM registry
        run: ./ocm transfer ctf --overwrite transport.ctf "${{ inputs.ocmRegistryUrl }}"

      - name: Trigger PlatformMesh OCM build
        run: |
          gh workflow run ocm.yaml --repo "platform-mesh/ocm"
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
