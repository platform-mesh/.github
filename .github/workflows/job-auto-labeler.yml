name: Auto Labeler
on:
  workflow_call: {}

jobs:
  auto-labeler:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
    steps:
      - name: Checkout
        uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6
      - name: Run auto-labeler
        id: auto-labeler
        uses: mauroalderete/action-assign-labels@671a4ca2da0f900464c58b8b5540a1e07133e915 # v1
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          conventional-commits: |
            conventional-commits:
              - type: 'fix'
                nouns: ['FIX', 'Fix', 'fix', 'FIXED', 'Fixed', 'fixed']
                labels: ['fix']
              - type: 'feature'
                nouns: ['FEATURE', 'Feature', 'feature', 'FEAT', 'Feat', 'feat']
                labels: ['feature']
              - type: 'breaking_change'
                nouns: ['BREAKING CHANGE', 'BREAKING', 'MAJOR']
                labels: ['BREAKING CHANGE']
              - type: 'documentation'
                nouns: ['doc', 'docs', 'docu','document','documentation']
                labels: ['documentation']
              - type: 'ci'
                nouns: ['build','rebuild','ci']
                labels: ['ci']
              - type: 'dependencies'
                nouns: ['build(deps)','build(deps-dev)', 'fix(deps)']
                labels: ['ci','dependencies']
              - type: 'config'
                nouns: ['config', 'conf', 'configuration', 'configure']
                labels: ['chore']
              - type: 'chore'
                nouns: ['chore', 'test', 'refactor', 'style']
                labels: ['chore']
              - type: 'perf'
                nouns: ['perf']
                labels: ['enhancement']
              - type: 'revert'
                nouns: ['revert']
                labels: ['fix']